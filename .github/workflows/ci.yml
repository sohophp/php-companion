name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Quality (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm package:all
      - run: pnpm verify:vsix
      - if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: php-companion-vsix
          if-no-files-found: error
          path: |
            php-companion-0.1.0.vsix
            packages/php-companion-extension-pack/php-companion-open-source-pack-0.1.0.vsix
            packages/php-companion-recommended-pack/php-companion-recommended-pack-0.1.0.vsix

  php-integration:
    name: PHP ${{ matrix.php }} integration
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['7.2', '7.3', '7.4', '8.0', '8.1', '8.2', '8.3', '8.4', '8.5']
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:integration:php
        env:
          PHP_COMPANION_TEST_PHP_BINARIES: '{"${{ matrix.php }}":"php"}'

  extension-host:
    name: Extension host
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:extension
      - run: pnpm test:extension:intelephense
